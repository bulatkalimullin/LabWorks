
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
    ports:
      - "2000:8000"
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: nouchka/sqlite3:latest
    volumes:
      - db_volume:/root/db
    networks:
      - app-network

volumes:
  db_volume:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge
