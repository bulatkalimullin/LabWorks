
{% extends 'base.html' %}
{% block title %}Курсы{% endblock %}
{% block content %}
    <h1 class="mb-4">Курсы</h1>
    <div class="row">
        {% for course in courses %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ course.name }}</h5>
                        <a href="{% url 'laboratory:course_detail' course.id %}" class="btn btn-primary">Посмотреть задания</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <p class="text-muted">Курсы отсутствуют.</p>
        {% endfor %}
    </div>
{% endblock %}
